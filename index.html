    <style>
        @font-face {
            font-family: 'Galmuri14';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2506-1@1.0/Galmuri14.woff2') format('woff2');
            font-weight: normal;

        :root {
            --bg-color: #f0f2f5; 
            --panel: #fff;
            --main-color: #22C55E;
            --text-color: #333;
            --glass-color: rgba(255, 255, 255, 0.4);
            --blur: 20px;
            --home-scale: 1;
        }
    
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 10px; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        body {
            margin: 0; font-family: 'Galmuri14', sans-serif;
            background-color: var(--bg-color); background-repeat: no-repeat;
            background-size: cover; background-position: center;
            background-attachment: fixed; display: grid; 
            grid-template-columns: 380px 1fr; height: 100vh; overflow: hidden;
            color: var(--text-color);
        }

        /* 에디터 패널 디자인 */
        .editor-panel { 
            background: var(--panel); border-right: 1px solid #ddd; padding: 25px; 
            overflow-y: auto; height: 100vh; box-sizing: border-box; z-index: 100;
            box-shadow: 5px 0 15px rgba(0,0,0,0.05);
        }
        .control-group { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; }
        .control-group label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; }
        
        input, textarea, select { 
            width: 100%; box-sizing: border-box; border: 1px dashed #ccc; 
            padding: 8px; border-radius: 6px; font-family: 'Galmuri14'; margin-bottom: 8px; font-size: 11px;
        }

        .btn-row { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .add-btn { 
            background: var(--main-color); color: white; border: none; 
            padding: 10px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; font-family: 'Galmuri14'; font-size: 11px;
        }
        .add-btn:hover { opacity: 0.8; }

        /* 프리뷰 및 홈피 레이아웃 */
        .preview-area { display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.05); overflow: auto; padding: 40px; position: relative; }
        .home-container {
            display: grid; grid-template-columns: 240px 1fr;
            width: 880px; height: 600px; gap: 20px; padding: 30px;
            background: var(--glass-color); backdrop-filter: blur(var(--blur));
            border-radius: 45px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            transform: scale(var(--home-scale));
        }

        .sidebar { display: flex; flex-direction: column; gap: 15px; z-index: 10; overflow: hidden; }
        .profile-card { background: rgba(255,255,255,0.4); padding: 20px; border-radius: 35px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .profile-img-wrap { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--main-color); margin: 0 auto 10px; overflow: hidden; }
        
        .mini-player { 
            background: rgba(0,0,0,0.05); 
            border-radius: 18px; 
            overflow: hidden; 
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        #youtube-frame { width: 100%; height: 100%; border: none; display: block; }
        
        .sns-link { background: #333; color: white; text-decoration: none; padding: 10px; border-radius: 12px; font-size: 10px; text-align: center; font-weight: bold; margin-bottom: 4px; display: block; transition: 0.2s; }
        .sns-link:hover { background: #555; }
        
        .main-content { background: rgba(255,255,255,0.1); border-radius: 35px; padding: 25px; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
        
        .content-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: min-content;
            gap: 15px; 
            overflow-y: auto; 
            flex: 1; 
            align-content: start; 
            padding-right: 5px;
        }
        
        .item-block { 
            aspect-ratio: 5.5 / 8.5; background: #fff; border-radius: 12px; 
            overflow: hidden; cursor: pointer; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); transition: 0.2s;
            height: fit-content;
        }
        .item-block:hover { transform: translateY(-5px); }
        .item-block img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        #sticker-layer { position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .sticker { position: absolute; cursor: move; pointer-events: auto; }
        .sticker img { pointer-events: none; width: 100%; height: 100%; object-fit: contain; }

        #modal-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); 
            display: none; align-items: center; justify-content: center; 
            z-index: 2000; border-radius: 45px; 
        }
        .modal-content { width: 450px; max-height: 85%; background: #fff; border-radius: 25px; overflow: hidden; }
        .modal-body { padding: 30px; overflow-y: auto; }

        .manage-box { max-height: 80px; overflow-y: auto; background: #fff; border: 1px solid #eee; margin-top: 5px; font-size: 10px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; border-bottom: 1px solid #eee; }
        .del-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 9px; }

        .maker-credit {
            position: fixed; bottom: 20px; left: 20px; 
            font-size: 12px; color: rgba(0,0,0,0.4); 
            background: rgba(255,255,255,0.5); padding: 5px 10px; 
            border-radius: 20px; z-index: 9999; pointer-events: none;
        }
    </style>
